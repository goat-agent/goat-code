name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  LINUX_DEPS: >-
    libwayland-dev libxkbcommon-dev libpipewire-0.3-dev libgbm-dev libdrm-dev
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libegl1-mesa-dev

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - if: runner.os != 'Linux'
        run: cargo test --workspace
      - if: runner.os == 'Linux'
        name: Linux test build under GNU timeout
        run: |
          set -o pipefail

          status=0
          timeout --foreground --kill-after=30 1200 \
            cargo test --workspace --no-run --message-format=json \
            > cargo-test-build.json 2> cargo-test-build.err || status=$?

          if [ "$status" -ne 0 ]; then
            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "::error::HUNG_TEST_BUILD cargo test --no-run exceeded 1200s and was killed by timeout (exit $status)"
            else
              echo "::error::cargo test --no-run failed (exit $status)"
            fi
            echo "===== cargo stdout (cargo-test-build.json) ====="
            cat cargo-test-build.json 2>/dev/null || true
            echo "===== cargo stderr (cargo-test-build.err) ====="
            cat cargo-test-build.err 2>/dev/null || true
            echo "===== process forest ====="
            ps -e --forest -o pid,ppid,pgid,stat,etime,rss,args 2>&1 || true
            exit "$status"
          fi

          echo "Test build succeeded; discriminates build-vs-test hang."

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTUP_TOOLCHAIN: "1.95"
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - run: rustup toolchain install 1.95 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo check --workspace
