name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  LINUX_DEPS: >-
    libwayland-dev libxkbcommon-dev libpipewire-0.3-dev libgbm-dev libdrm-dev
    libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libegl1-mesa-dev

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - if: runner.os != 'Linux'
        run: cargo test --workspace
      - if: runner.os == 'Linux'
        run: |
          cargo test --workspace --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.profile.test==true) | .executable' > /tmp/bins.txt
          cat /tmp/bins.txt
          rc=0
          while read -r bin; do
            [ -z "$bin" ] && continue
            echo "=== RUNNING $bin ==="
            if ! timeout 90 "$bin" --test-threads=1; then
              echo "!!! HUNG OR FAILED: $bin !!!"
              rc=1
            fi
          done < /tmp/bins.txt
          exit $rc

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTUP_TOOLCHAIN: "1.95"
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - run: rustup toolchain install 1.95 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo check --workspace
